name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: feedsilo-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          install -m 700 -d ~/.ssh
          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          KEY_CONTENT="${{ secrets.FEEDSILO_DEPLOY_SSH_KEY }}"
          CLEAN_KEY="$(printf '%s' "$KEY_CONTENT" | tr -d '\r')"
          KEY_OK=0

          # Try the secret as a raw private key first.
          printf '%s\n' "$CLEAN_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            KEY_OK=1
          else
            # Fall back to base64-decoding the secret.
            printf '%s' "$CLEAN_KEY" | tr -d '\n ' | base64 -d > ~/.ssh/id_ed25519.decoded 2>/dev/null || true
            if [ -f ~/.ssh/id_ed25519.decoded ]; then
              chmod 600 ~/.ssh/id_ed25519.decoded
            fi
            if [ -f ~/.ssh/id_ed25519.decoded ] && ssh-keygen -y -f ~/.ssh/id_ed25519.decoded >/dev/null 2>&1; then
              mv ~/.ssh/id_ed25519.decoded ~/.ssh/id_ed25519
              KEY_OK=1
            fi
          fi

          if [ "$KEY_OK" -ne 1 ]; then
            echo "FEEDSILO_DEPLOY_SSH_KEY is not a valid raw or base64-encoded SSH private key"
            exit 1
          fi

          rm -f ~/.ssh/id_ed25519.decoded
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$FEEDSILO_HOST_CLEAN" >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Deploy to Hetzner
        shell: bash
        run: |
          set -euo pipefail
          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          FEEDSILO_USER_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_USER }}" | tr -d '\r' | xargs)"
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "$FEEDSILO_USER_CLEAN@$FEEDSILO_HOST_CLEAN" \
            "GITHUB_SHA_VALUE='${{ github.sha }}' bash -s" <<'REMOTE_SCRIPT'
              set -euo pipefail
              APP_DIR=/srv/feedsilo
              RELEASES_DIR="/tmp/feedsilo-releases-$(id -un)"
              RELEASE_DIR="$RELEASES_DIR/$GITHUB_SHA_VALUE"

              mkdir -p "$RELEASES_DIR"
              cd "$APP_DIR"
              git fetch origin
              git checkout dev
              git pull --ff-only origin dev
              command -v rsync >/dev/null

              git worktree remove --force "$RELEASE_DIR" >/dev/null 2>&1 || true
              rm -rf "$RELEASE_DIR"
              git worktree add --force --detach "$RELEASE_DIR" "$GITHUB_SHA_VALUE"

              cleanup() {
                git -C "$APP_DIR" worktree remove --force "$RELEASE_DIR" >/dev/null 2>&1 || rm -rf "$RELEASE_DIR"
              }
              trap cleanup EXIT

              if [ -f "$APP_DIR/.env.local" ]; then
                cp -p "$APP_DIR/.env.local" "$RELEASE_DIR/.env.local"
              fi

              if [ -f "$APP_DIR/feedsilo.config.json" ]; then
                cp -p "$APP_DIR/feedsilo.config.json" "$RELEASE_DIR/feedsilo.config.json"
              fi

              cd "$RELEASE_DIR"
              npm ci --no-audit --no-fund
              npm run build

              rsync -a --delete \
                --exclude .git \
                --exclude .env.local \
                "$RELEASE_DIR/" "$APP_DIR/"

              restart_feedsilo() {
                cd "$APP_DIR"

                if command -v pm2 >/dev/null 2>&1 && pm2 describe feedsilo >/dev/null 2>&1; then
                  pm2 restart feedsilo
                  return 0
                fi

                if systemctl --user status feedsilo >/dev/null 2>&1; then
                  systemctl --user restart feedsilo
                  return 0
                fi

                if sudo -n true >/dev/null 2>&1; then
                  sudo systemctl restart feedsilo
                  return 0
                fi

                local listen_pid=""
                if command -v lsof >/dev/null 2>&1; then
                  listen_pid="$(lsof -nP -tiTCP:3000 -sTCP:LISTEN -a -u "$(id -un)" | head -n 1 || true)"
                fi

                if [ -z "$listen_pid" ] && command -v fuser >/dev/null 2>&1; then
                  for candidate_pid in $(fuser 3000/tcp 2>/dev/null || true); do
                    if [ "$(ps -o user= -p "$candidate_pid" | xargs || true)" = "$(id -un)" ]; then
                      listen_pid="$candidate_pid"
                      break
                    fi
                  done
                fi

                if [ -n "$listen_pid" ]; then
                  kill "$listen_pid"
                  for _ in 1 2 3 4 5; do
                    if ! kill -0 "$listen_pid" >/dev/null 2>&1; then
                      break
                    fi
                    sleep 1
                  done
                fi

                if curl --silent --show-error --fail http://127.0.0.1:3000/login >/dev/null 2>&1; then
                  echo "Port 3000 is still served by a process this deploy user cannot restart"
                  return 1
                fi

                nohup npm run start >> "$APP_DIR/.feedsilo.log" 2>&1 &
                echo "$!" > "$APP_DIR/.feedsilo.pid"
              }

              restart_feedsilo

              for _ in 1 2 3 4 5 6; do
                if curl --silent --show-error --fail http://127.0.0.1:3000/login >/dev/null; then
                  exit 0
                fi
                sleep 2
              done

              echo "FeedSilo failed health check after deploy"
              systemctl --user status feedsilo --no-pager || true
              sudo -n systemctl status feedsilo --no-pager || true
              tail -n 80 "$APP_DIR/.feedsilo.log" || true
              exit 1
          REMOTE_SCRIPT
