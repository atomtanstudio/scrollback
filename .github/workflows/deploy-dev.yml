name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: feedsilo-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          KEY_CONTENT="${{ secrets.FEEDSILO_DEPLOY_SSH_KEY }}"
          CLEAN_KEY="$(printf '%s' "$KEY_CONTENT" | tr -d '\r')"
          KEY_OK=0

          # Try the secret as a raw private key first.
          printf '%s\n' "$CLEAN_KEY" > ~/.ssh/id_ed25519
          if ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            KEY_OK=1
          else
            # Fall back to base64-decoding the secret.
            printf '%s' "$CLEAN_KEY" | tr -d '\n ' | base64 -d > ~/.ssh/id_ed25519.decoded 2>/dev/null || true
            if [ -f ~/.ssh/id_ed25519.decoded ] && ssh-keygen -y -f ~/.ssh/id_ed25519.decoded >/dev/null 2>&1; then
              mv ~/.ssh/id_ed25519.decoded ~/.ssh/id_ed25519
              KEY_OK=1
            fi
          fi

          if [ "$KEY_OK" -ne 1 ]; then
            echo "FEEDSILO_DEPLOY_SSH_KEY is not a valid raw or base64-encoded SSH private key"
            exit 1
          fi

          rm -f ~/.ssh/id_ed25519.decoded
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$FEEDSILO_HOST_CLEAN" >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Deploy to Hetzner
        shell: bash
        run: |
          set -euo pipefail
          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          FEEDSILO_USER_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_USER }}" | tr -d '\r' | xargs)"
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "$FEEDSILO_USER_CLEAN@$FEEDSILO_HOST_CLEAN" \
            "bash -lc '
              set -euo pipefail
              cd /srv/feedsilo
              git fetch origin
              git checkout dev
              git pull --ff-only origin dev
              npm ci --no-audit --no-fund
              npm run build
              sudo systemctl restart feedsilo
              sleep 5
              curl -I --fail http://127.0.0.1:3000
            '"
