name: Authorize SSH Key

on:
  workflow_dispatch:
    inputs:
      public_key:
        description: "Public SSH key to add to the deploy user's authorized_keys"
        required: true
        type: string

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure deploy SSH key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          install -m 700 -d ~/.ssh

          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          KEY_CONTENT="${{ secrets.FEEDSILO_DEPLOY_SSH_KEY }}"
          CLEAN_KEY="$(printf '%s' "$KEY_CONTENT" | tr -d '\r')"
          KEY_OK=0

          printf '%s\n' "$CLEAN_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            KEY_OK=1
          else
            printf '%s' "$CLEAN_KEY" | tr -d '\n ' | base64 -d > ~/.ssh/id_ed25519.decoded 2>/dev/null || true
            if [ -f ~/.ssh/id_ed25519.decoded ]; then
              chmod 600 ~/.ssh/id_ed25519.decoded
            fi
            if [ -f ~/.ssh/id_ed25519.decoded ] && ssh-keygen -y -f ~/.ssh/id_ed25519.decoded >/dev/null 2>&1; then
              mv ~/.ssh/id_ed25519.decoded ~/.ssh/id_ed25519
              KEY_OK=1
            fi
          fi

          if [ "$KEY_OK" -ne 1 ]; then
            echo "FEEDSILO_DEPLOY_SSH_KEY is not a valid raw or base64-encoded SSH private key"
            exit 1
          fi

          rm -f ~/.ssh/id_ed25519.decoded
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$FEEDSILO_HOST_CLEAN" >> ~/.ssh/known_hosts

      - name: Add public key to deploy user
        shell: bash
        env:
          PUBLIC_KEY: ${{ inputs.public_key }}
        run: |
          set -euo pipefail
          FEEDSILO_HOST_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_HOST }}" | tr -d '\r' | xargs)"
          FEEDSILO_USER_CLEAN="$(printf '%s' "${{ secrets.FEEDSILO_USER }}" | tr -d '\r' | xargs)"

          case "$PUBLIC_KEY" in
            ssh-ed25519\ *|ssh-rsa\ *|ecdsa-sha2-nistp256\ *|ecdsa-sha2-nistp384\ *|ecdsa-sha2-nistp521\ *)
              ;;
            *)
              echo "Input does not look like a supported public SSH key"
              exit 1
              ;;
          esac

          PUBLIC_KEY_B64="$(printf '%s' "$PUBLIC_KEY" | base64 -w0)"

          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$FEEDSILO_USER_CLEAN@$FEEDSILO_HOST_CLEAN" \
            "PUBLIC_KEY_B64='$PUBLIC_KEY_B64' bash -s" <<'REMOTE_SCRIPT'
              set -euo pipefail
              PUBLIC_KEY="$(printf '%s' "$PUBLIC_KEY_B64" | base64 -d)"
              install -m 700 -d ~/.ssh
              touch ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
              grep -qxF "$PUBLIC_KEY" ~/.ssh/authorized_keys || printf '%s\n' "$PUBLIC_KEY" >> ~/.ssh/authorized_keys
              echo "authorized_key_installed=true"
              echo "remote_user=$(whoami)"
              echo "remote_home=$HOME"
          REMOTE_SCRIPT
