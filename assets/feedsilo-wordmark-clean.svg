<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B222C"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="gold-dot" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#D4B07C"/>
      <stop offset="1" stop-color="#B89462"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&amp;display=swap');
      .wordmark {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-weight: 600;
        font-size: 180px;
        letter-spacing: -0.05em;
        fill: #f2ede5;
      }
    </style>
  </defs>

  <!-- Background: 1080p -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="960" cy="540" r="360" gradientUnits="userSpaceOnUse">
    <stop stop-color="#B89462" stop-opacity="0.06"/>
    <stop offset="1" stop-color="#B89462" stop-opacity="0"/>
  </radialGradient>
  <circle cx="960" cy="540" r="360" fill="url(#glow)"/>

  <!-- Wordmark centered -->
  <text class="wordmark" text-anchor="middle" x="960" y="560">
    feed&#x2003;silo
  </text>

  <!-- Gold dot between feed and silo -->
  <circle cx="960" cy="523" r="28" fill="url(#gold-dot)"/>
</svg>
